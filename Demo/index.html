    <script>
        // ForepaperEngine在加载Forepaper作品时会从url中传入一个名叫current_mode的参数，表示当前的模式：1 操作模式，2 屏保模式，3 锁屏模式
        // ForepaperEngine will pass a parameter called current_mode to the url when loading a Forepaper work, indicating the current mode: 1 operation mode, 2 screen saver mode, 3 lock screen mode
        let currentForepaperEngineMode = new URLSearchParams(window.location.search).get('current_mode');
        switch (currentForepaperEngineMode) {
            case '1':
                console.log('operation mode');
                break;
            case '2':
                console.log('screen saver mode');
                break;
            case '3':
                console.log('lock screen mode');
                break;
        }

        // 如果您的Forepaper作品同时支持多种模式，并且您的作品被应用在了多种模式中，那么很显然你的作品可能需要在运行时监听ForepaperEngine的模式变化，你需要在全局作用域中公开声明以下函数，以便ForepaperEngine可以在模式发生变化时调用，传入的参数：1 操作模式，2 屏保模式，3 锁屏模式
        // If your Forepaper work supports multiple modes and is used in multiple modes, it is obviously your work needs to listen for mode changes in real time, and you need to expose the following function in the global scope so that ForepaperEngine can call it when the mode changes, passing in the parameters: 1 operation mode, 2 screen saver mode, 3 lock screen mode
        function ForepaperEngineChangeMode(mode) {
            currentForepaperEngineMode = mode;
            switch (currentForepaperEngineMode) {
                case '1':
                    console.log('operation mode');
                    break;
                case '2':
                    console.log('screen saver mode');
                    break;
                case '3':
                    console.log('lock screen mode');
                    break;

        function SendKeyboardInput() {
            // example usage: send WIN+S

            // Keyboard scancode see KeyboardScanCode.txt
            const keyInfoArr = [
                {
                    scanCode: 0x5B,//Scancode of [win]
                    flag: 9//ExtendedKey down
                },
                {
                    scanCode: 0x1F,//Scancode of [S]
                    flag: 8//StandardKey down
                },
                {
                    scanCode: 0x1F,//Scancode of [S]
                    flag: 10//StandardKey up
                },
                {
                    scanCode: 0x5B,//Scancode of [win]
                    flag: 11//ExtendedKey up
                }
            ]

            let keyInfoArrStr = "";
            for(let i = 0; i < keyInfoArr.length; i++) {
                keyInfoArrStr += keyInfoArr[i].scanCode + "," + keyInfoArr[i].flag + "|";
            }
            keyInfoArrStr = keyInfoArrStr.slice(0, -1); //remove last '|' character
            ForepaperEngineSendKeyboardInput(keyInfoArrStr);
        }
